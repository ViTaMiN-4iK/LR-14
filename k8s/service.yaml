apiVersion: v1
kind: Service
metadata:
  name: medical-collector-svc
  namespace: medical-monitoring
  labels:
    app: medical-collector
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: nats
    port: 4222
    targetPort: 4222
    protocol: TCP
  selector:
    app: medical-collector
---
apiVersion: v1
kind: Service
metadata:
  name: medical-collector-lb
  namespace: medical-monitoring
  labels:
    app: medical-collector
  annotations:
    service.beta.kubernetes.io/load-balancer-source-ranges: "0.0.0.0/0"
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  selector:
    app: medical-collector
